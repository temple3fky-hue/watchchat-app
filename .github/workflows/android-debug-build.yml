name: Android Debug Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-debug-apks:
    name: Build mobile and wear debug APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Create production local.properties for CI
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing GitHub Actions secrets: SUPABASE_URL and/or SUPABASE_ANON_KEY"
            echo "Add them in GitHub: Settings > Secrets and variables > Actions > New repository secret"
            exit 1
          fi

          cat > local.properties <<EOF
          SUPABASE_URL=$SUPABASE_URL
          SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
          WATCHCHAT_ALLOW_DEMO_MODE=false
          EOF

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build debug APKs
        run: ./gradlew :mobile-app:assembleDebug :wear-app:assembleDebug --stacktrace

      - name: Upload mobile debug APK
        uses: actions/upload-artifact@v4
        with:
          name: mobile-app-debug-apk
          path: mobile-app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload wear debug APK
        uses: actions/upload-artifact@v4
        with:
          name: wear-app-debug-apk
          path: wear-app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
